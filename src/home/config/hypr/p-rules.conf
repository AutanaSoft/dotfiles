windowrule = float on, center 1, size 1043 587, match:class org.gnome.Nautilus
windowrule = float on, match:class org.gnome.Calculator
windowrule = float on, center 1, size 1043 587, match:class ^Spotify$
windowrule = float on, center 1, size 1043 587, match:class ^org\.omarchy\.cliamp$
windowrule = float on, center 1, size 1043 587, match:class ^org\.omarchy\.nvim$
windowrule = float on, center 1, size 1043 587, match:class ^Alacritty$
windowrule = float on, center 1, size 1043 587, match:class ^discord$

windowrule = float on, center 1, size 1043 587, match:class ^chrome-www\.netflix\.com__-Default$
windowrule = float on, center 1, size 1043 587, match:class ^chrome-web\.whatsapp\.com__-Default$
windowrule = float on, center 1, size 1043 587, match:class ^chrome-www\.youtube\.com__-Default$

# PiP tag: Omarchy's apps/pip.conf owns the full block (float, pin, opacity,
# move). This line just adds the ES title and the PiP acronym to Omarchy's
# EN regex, since Omarchy only ships `(Picture.?in.?[Pp]icture)`.
windowrule = tag +pip, match:title ([Pp]antalla.?en.?[Pp]antalla|Picture.?in.?[Pp]icture|[Pp][Ii][Pp])
# Size override: PiP opens at 1043x587 instead of Omarchy's default 600x338.
windowrule = size 1043 587, match:tag pip
