# Personal Hyprland configuration index
# Sourced from hyprland.conf to apply user customizations on top of Omarchy defaults.
# Survives `omarchy update` because Omarchy does not touch files prefixed with `p-`.

source = ~/.config/hypr/p-monitors.conf
source = ~/.config/hypr/p-bindings.conf
source = ~/.config/hypr/p-looknfeel.conf
source = ~/.config/hypr/p-rules.conf
