# OpenSpec project config — dotfiles
# Generated by sdd-init on 2026-06-15 (re-run: openspec/ promoted to tracked).
# Bootstrap file for SDD context in this repo. Owned by the dotfiles project;
# `openspec/` is versioned in git on purpose (was gitignored under the B1-only
# session policy, promoted to tracked on 2026-06-15 alongside the `docs/ideas`
# symlink-to-real-folder migration).

schema: spec-driven

# `openspec/` is versioned in git on purpose. This flag documents the project-
# level policy flip on 2026-06-15: the previous "gitignored on purpose" line
# is retired, and the directory is now expected to be staged and committed
# like any other tracked folder.
versioned: true

# Concise project context for any later SDD phase. Keep under 10 lines.
context: |
  Two-env personal dotfiles repo: `omarchy/` (Arch+Hyprland: Hyprland, Alacritty,
  Zellij, nvim, Mako, Waybar) and `fedora/` (WezTerm, Zellij, nvim, Zsh, Starship,
  SSH). Shared canonical configs in `shared/` (Zellij, nvim/LazyVim, Starship,
  opencode.nvim); env-specific folders symlink into `shared/`. Repo is the source
  of truth; live `~/` and `~/.config/...` are symlinks; root `./setup` dispatches
  to `scripts/setup-omarchy` / `scripts/setup-deps` / `scripts/setup-fonts`.
  Conventions: `p-` prefix survives `omarchy update`; removal = `# Reason:`; SSH
  under `shared/home/.ssh/*` gitignored except `config` template. Indent 2sp
  default; 4sp for KDL/shell/Hyprland `.conf`; MD exempt from trailing-trim.
  Document artifacts default to English; replies to the developer in neutral
  Latin American Spanish. Existing main spec: `openspec/specs/setup-orchestration/spec.md`.

# Strict TDD marker. Dotfiles repo, not application code: only one bash TAP
# smoke test (`tests/setup-deps.bash`) exists; RED-GREEN-REFACTOR does not
# apply as a workflow gate.
strict_tdd: false

# Project-specific rules per SDD phase. Kept short and grounded in repo policy.
rules:
  proposal:
    - Read `AGENTS.md` and `docs/conventions.md` before drafting.
    - Honor the symlink contract: never propose files under `~/.local/share/omarchy/`,
      `~/.ssh/` (private keys, known_hosts), or per-host omarchy configs.
    - Use English for all proposal/spec/design/tasks/verify/report artifacts.
  specs:
    - Use Given/When/Then for scenarios; RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
    - Reference symlink targets with the `<env>/<path>` → `~/...` form used in
      `omarchy/README.md` and `fedora/README.md`.
  design:
    - Document the shared-vs-env boundary explicitly; justify any file that
      belongs in `shared/` vs the env folder.
    - For changes touching `shared/`, call out the `omarchy update` interaction.
  tasks:
    - Group by work unit; keep each unit completable in one session.
    - For changes that touch `scripts/`, pair the implementation with a test
      case in `tests/setup-deps.bash` (or a sibling bash TAP file) when feasible.
  apply:
    - Follow existing config patterns; do not invent new layout conventions.
    - Do not commit, push, or open PRs without explicit user request.
    tdd: false
    test_command: "bash tests/setup-deps.bash"
  verify:
    - Run the bash TAP smoke test when the change touched `setup` or `scripts/`.
    - For Hyprland changes: document the `hyprctl reload && hyprctl configerrors`
      result (configerrors MUST be empty).
    test_command: "bash tests/setup-deps.bash"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Never delete or modify archived change folders.
    - When a delta touches a main spec, merge into `openspec/specs/<domain>/spec.md`
      and remove the delta block from the change folder.

# Testing capabilities. This is a dotfiles repo; "testing" is limited to a
# repo-native bash TAP harness for the root `./setup` dispatcher. There is
# no language test runner, no coverage tooling, and no CI.
testing:
  strict_tdd: false
  detected: 2026-06-15
  runner:
    command: "bash tests/setup-deps.bash"
    framework: "bash TAP (repo-native, no external deps)"
  layers:
    unit: false
    integration: false
    e2e: false
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: false
      command: ""
    formatter:
      available: true
      command: "prettier (markdown/json); .editorconfig (global)"
  notes: |
    `tests/setup-deps.bash` is a bash TAP harness for the root `./setup`
    dispatcher. It does not cover tool config correctness (Hyprland, Zellij,
    nvim, Zsh, WezTerm). Style enforcement comes from `.editorconfig` and
    Prettier (markdown/json). No CI workflow is configured.
