# Unbind defaults we don't use or that conflict with our overrides
unbind = SUPER, RETURN
unbind = SUPER ALT, RETURN
unbind = SUPER SHIFT, B
unbind = SUPER SHIFT, C
unbind = SUPER SHIFT, E
unbind = SUPER SHIFT, N
unbind = SUPER SHIFT, W
unbind = SUPER SHIFT, G
unbind = SUPER SHIFT, SLASH
unbind = SUPER SHIFT, A
unbind = SUPER SHIFT ALT, A
unbind = SUPER SHIFT, X
unbind = SUPER SHIFT ALT, X
unbind = SUPER SHIFT CTRL, G
unbind = SUPER SHIFT, P
unbind = SUPER SHIFT ALT, G
unbind = SUPER SHIFT, M

# Personal keybindings (overrides of omarchy defaults)
# Terminal
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "exec zellij"
bindd = SUPER ALT, RETURN, Zellij terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "exec zellij attach --create AutanaSoft"

# Productivity
bindd = SUPER SHIFT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, C, Calculator, exec, omarchy-launch-or-focus Calculator gnome-calculator
bindd = SUPER SHIFT, E, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"

# Media
bindd = SUPER SHIFT, N, Netflix, exec, omarchy-launch-webapp "https://www.netflix.com/"
bindd = SUPER SHIFT, R, Raadio TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, S, Spotify, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://www.youtube.com/"

