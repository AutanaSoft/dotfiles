# ----------------------------------------------------------------------------
# keyd default profile — Omarchy keyboard remap
# ----------------------------------------------------------------------------
# Purpose: silence the unwanted media keys (VolUp / VolDown) and remap the
# broken hardware "up" arrow to "pagedown". This file is the repo source
# of truth. `omarchy/utils/bash/setup-dots` copies it to /etc/keyd/default.conf
# (mode 0644) on every `./setup --dots` run. keyd runs as root and
# reads ONLY from /etc/keyd/ — there is intentionally no ~/.config/keyd/
# symlink.
#
# Reload: after editing this file, run `./setup --dots` (which
# re-installs the config and reloads keyd) or do it manually:
#
#     sudo install -m 644 <repo>/omarchy/etc/keyd/default.conf \
#         /etc/keyd/default.conf
#     sudo keyd reload
#
# Inspect active bindings:
#     sudo keyd monitor    # real-time key events (also reveals VID:PID)
#     sudo keyd -v         # version
#
# VID:PID migration: `[ids] *` is the universal scope so the single
# keyboard works without device IDs. If you ever add a second keyboard
# that needs different bindings, run `sudo keyd monitor` and look for
# the `<vid>:<pid>` printed for each device. Then replace the `*` below
# with a line like:
#
#     [ids]
#     0001:0002:*
#
# matching that keyboard's IDs (and keep the `*` as a fallback for any
# unlisted device). keyd matches the most specific entry first.
# ----------------------------------------------------------------------------

[ids]
*

[main]
# Silence the unwanted media keys at the kernel level (keyd v2.6
# Example 8: `esc = noop; end = noop` is the documented disable
# pattern; `clear()` is a different action for toggled/oneshot
# layers and would NOT silence these keys).
volumeup    = noop
volumedown  = noop

# The hardware up arrow is broken. Remap pagedown to send up arrow
# as a substitute (press pagedown → up).
pagedown    = up
