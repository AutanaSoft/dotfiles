# See https://wiki.hypr.land/Configuring/Basics/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Previous generic setup kept commented for reference.
# Reason: replaced with an explicit dual-monitor layout for the current desk setup.
# monitor=,preferred,auto,auto

# Primary monitor: 24" AOC on DP-2
# Secondary monitor: 27" AOC on HDMI-A-1, placed to the left
# Vertical centering is achieved by offsetting the 1080p display by 180px
# relative to the 1440p display: (1440 - 1080) / 2 = 180.
monitor = HDMI-A-1, 2560x1440@143.91, 0x0, 1
monitor = DP-2, 1920x1080@165, 2560x180, 1
